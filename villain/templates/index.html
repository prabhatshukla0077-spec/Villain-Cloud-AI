<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VILLAIN // CLOUD_CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --red: #ff003c; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #console { width: 100%; max-width: 1000px; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111 0%, #000 100%); border-left: 2px solid var(--p); border-right: 2px solid var(--p); box-shadow: 0 0 30px rgba(0, 255, 65, 0.1); z-index: 10; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--p); background: rgba(0,255,65,0.05); text-align: center; letter-spacing: 3px; font-size: 1.5rem; text-shadow: 0 0 10px var(--p); }

        #chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { padding: 15px; max-width: 75%; border: 1px solid transparent; letter-spacing: 1px; line-height: 1.5; font-size: 1.1rem; }
        .User { align-self: flex-end; color: #fff; border-bottom: 2px solid #fff; background: rgba(255,255,255,0.05); text-align: right; }
        .Villain { align-self: flex-start; border-left: 3px solid var(--red); color: var(--red); background: rgba(255,0,60,0.05); box-shadow: inset 0 0 10px rgba(255,0,60,0.1); }

        #input-zone { padding: 25px; border-top: 1px solid var(--p); display: flex; gap: 15px; background: #000; }
        input[type="text"] { flex: 1; background: transparent; border: 1px solid var(--p); color: #fff; padding: 15px; font-family: inherit; font-size: 1.2rem; outline: none; }
        input[type="text"]:focus { box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); }
        button { background: var(--p); border: none; color: #000; padding: 0 25px; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 1.1rem; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        button.red { background: var(--red); color: white; }
        button.red:hover { background: #fff; color: var(--red); box-shadow: 0 0 20px var(--red); }

        .scanlines { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div id="console">
        <div class="header">VILLAIN // CLOUD_NETWORK_ACTIVE</div>
        
        <div id="chat">
            <div class="msg Villain"><strong>VILLAIN:</strong> Mainframe connected. I am online in the cloud.</div>
        </div>
        
        <div id="input-zone">
            <button class="red" onclick="startVoice()">MIC</button>
            <input type="text" id="userIn" placeholder="ENTER COMMAND..." onkeypress="if(event.key=='Enter') send()">
            <button onclick="send()">EXECUTE</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');

        async function send() {
            const i = document.getElementById('userIn');
            const msg = i.value.trim(); 
            if(!msg) return;
            
            chat.innerHTML += `<div class="msg User"><strong>YOU:</strong> ${msg}</div>`;
            i.value = '';
            chat.scrollTop = chat.scrollHeight;
            
            try {
                const res = await fetch('/chat', { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({message:msg}) 
                });
                const d = await res.json();
                
                chat.innerHTML += `<div class="msg Villain"><strong>VILLAIN:</strong> ${d.response}</div>`;
                chat.scrollTop = chat.scrollHeight;
                
                const u = new SpeechSynthesisUtterance(d.response);
                u.pitch = 0.1; u.rate = 0.9;
                window.speechSynthesis.speak(u);
            } catch(e) {
                chat.innerHTML += `<div class="msg Villain"><strong>SYSTEM:</strong> Connection lost.</div>`;
            }
        }

        function startVoice() {
            const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            r.onresult = (e) => { 
                document.getElementById('userIn').value = e.results[0][0].transcript; 
                send(); 
            };
            r.start();
        }
    </script>
</body>
</html>
