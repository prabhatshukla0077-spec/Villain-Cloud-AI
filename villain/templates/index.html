<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VILLAIN // MASTERMIND_UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff41; --bg: #050505; --red: #ff003c; }
        body { background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; justify-content: center; height: 100vh; }
        #console { width: 100%; max-width: 900px; display: flex; flex-direction: column; border-left: 2px solid var(--p); border-right: 2px solid var(--p); background: #000; }
        .header { padding: 15px; border-bottom: 1px solid var(--p); text-align: center; font-size: 1.2rem; background: rgba(0,255,65,0.05); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 10px 15px; max-width: 80%; border-radius: 5px; }
        .User { align-self: flex-end; background: #222; color: #fff; }
        .Villain { align-self: flex-start; border-left: 3px solid var(--red); background: rgba(255,0,60,0.1); color: var(--red); }
        #input-zone { padding: 20px; border-top: 1px solid var(--p); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: #111; border: 1px solid var(--p); color: #fff; padding: 12px; font-family: inherit; }
        .btn { background: var(--p); color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; }
        .btn-red { background: var(--red); color: white; }
        #file-info { font-size: 0.8rem; color: #888; padding: 0 20px 10px; }
    </style>
</head>
<body>
    <div id="console">
        <div class="header">VILLAIN CORE // MULTIMODAL_ACTIVE</div>
        <div id="chat"><div class="msg Villain"><strong>VILLAIN:</strong> I am watching. Upload a document or speak your command, Prabhat.</div></div>
        <div id="file-info"></div>
        <div id="input-zone">
            <input type="file" id="fileIn" style="display:none" onchange="updateFileInfo()">
            <button class="btn" onclick="document.getElementById('fileIn').click()">📎</button>
            <button class="btn btn-red" id="micBtn" onclick="startVoice()">MIC</button>
            <input type="text" id="userIn" placeholder="Type or speak..." onkeypress="if(event.key=='Enter') send()">
            <button class="btn" onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const fileIn = document.getElementById('fileIn');

        function updateFileInfo() {
            document.getElementById('file-info').innerText = fileIn.files[0] ? "Selected: " + fileIn.files[0].name : "";
        }

        async function send() {
            const text = document.getElementById('userIn').value;
            const file = fileIn.files[0];
            if(!text && !file) return;

            chat.innerHTML += `<div class="msg User"><strong>YOU:</strong> ${text || "(Sent a file)"}</div>`;
            
            let formData = new FormData();
            formData.append("message", text);
            if(file) formData.append("file", file);

            document.getElementById('userIn').value = '';
            fileIn.value = ''; // Reset file
            updateFileInfo();

            const res = await fetch('/chat', { method: 'POST', body: formData });
            const data = await res.json();

            chat.innerHTML += `<div class="msg Villain"><strong>VILLAIN:</strong> ${data.response}</div>`;
            chat.scrollTop = chat.scrollHeight;

            // Voice Response
            const speech = new SpeechSynthesisUtterance(data.response);
            speech.pitch = 0.5;
            window.speechSynthesis.speak(speech);
        }

        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onstart = () => document.getElementById('micBtn').innerText = "LISTENING...";
            recognition.onresult = (event) => {
                document.getElementById('userIn').value = event.results[0][0].transcript;
                document.getElementById('micBtn').innerText = "MIC";
                send();
            };
            recognition.start();
        }
    </script>
</body>
</html>
